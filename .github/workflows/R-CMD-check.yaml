on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

name: R-CMD-check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    # The full test suite has outgrown the previous 45-minute ceiling: the
    # Phase B "matrix completion" wave added ~30 test-matrix-*.R files (~180
    # real TMB fits), pushing Windows from ~26 min at #309 to >45 min, where
    # it was being killed by this timeout (runs 26656376351, 26682886014).
    # 75 minutes restores headroom on the slowest runner (Windows). This does
    # not raise per-run billing — Actions bills actual minutes used, so a job
    # that finishes early costs the same regardless of the ceiling; the
    # ceiling only prevents a premature kill of a run that is still healthy.
    # Ignored-source/process PRs still skip the expensive dependency/check
    # steps below while preserving this OS-named check for branch-protection
    # compatibility.
    timeout-minutes: 75

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Classify R CMD check scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          full_required=true
          reason="R CMD check required by default."

          is_fast_path_allowed() {
            case "$1" in
              AGENTS.md) return 0 ;;
              CLAUDE.md) return 0 ;;
              .github/pull_request_template.md) return 0 ;;
              CONTRIBUTING.md) return 0 ;;
              ROADMAP.md) return 0 ;;
              docs/*) return 0 ;;
              docs/**) return 0 ;;
              dev/*) return 0 ;;
              dev/**) return 0 ;;
              docs/dev-log/check-log.md) return 0 ;;
              docs/dev-log/coordination-board.md) return 0 ;;
              docs/dev-log/team-improvements.md) return 0 ;;
              docs/dev-log/after-task/*) return 0 ;;
              docs/dev-log/shannon-audits/*) return 0 ;;
              docs/dev-log/while-away/*) return 0 ;;
              docs/dev-log/recovery-checkpoints/*) return 0 ;;
              *) return 1 ;;
            esac
          }

          requires_light_r_parse() {
            case "$1" in
              dev/*.R) return 0 ;;
              dev/**/*.R) return 0 ;;
              *) return 1 ;;
            esac
          }

          changed_file_args=()
          light_r_required=false

          collect_changed_files() {
            changed_file_args=()
            while IFS= read -r path; do
              [[ -n "$path" ]] && changed_file_args+=("$path")
            done < <(git diff --name-only "$@")
          }

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags origin "+refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
            base_ref="origin/${{ github.base_ref }}"
            collect_changed_files "${base_ref}...HEAD"
            full_required=false
            reason="PR changes are limited to ignored-source/process paths."
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" != "tag" ]]; then
            before="${{ github.event.before }}"
            if [[ "$before" =~ ^0+$ ]]; then
              changed_file_args=()
              full_required=true
              reason="Push has no usable before SHA; running full R CMD check."
            else
              collect_changed_files "$before" "${{ github.sha }}"
              full_required=false
              reason="Push changes are limited to ignored-source/process paths."
            fi
          else
            changed_file_args=()
            full_required=true
            reason="Manual dispatch or tag build; running full R CMD check."
          fi

          if [[ ${#changed_file_args[@]} -eq 0 && "$full_required" == "false" ]]; then
            full_required=true
            reason="No changed files detected; running full R CMD check."
          fi

          if [[ "$full_required" == "false" ]]; then
            for path in "${changed_file_args[@]}"; do
              if ! is_fast_path_allowed "$path"; then
                full_required=true
                reason="R CMD check required because '${path}' is outside ignored-source/process paths."
                break
              fi
              if requires_light_r_parse "$path" && [[ -f "$path" ]]; then
                light_r_required=true
              fi
            done
          fi

          if [[ "$full_required" == "true" ]]; then
            light_r_required=false
          fi

          {
            echo "full_required=${full_required}"
            echo "light_r_required=${light_r_required}"
            echo "reason=${reason}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### R CMD check scope"
            echo
            echo "- Full R CMD check required: \`${full_required}\`"
            echo "- Light R parse required: \`${light_r_required}\`"
            echo "- Reason: ${reason}"
            echo
            echo "Changed files:"
            if [[ ${#changed_file_args[@]} -eq 0 ]]; then
              echo "- (none detected)"
            else
              for path in "${changed_file_args[@]}"; do
                echo "- \`${path}\`"
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: r-lib/actions/setup-pandoc@v2
        if: steps.scope.outputs.full_required == 'true'

      - uses: r-lib/actions/setup-r@v2
        if: steps.scope.outputs.full_required == 'true'
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r@v2
        if: steps.scope.outputs.full_required != 'true' && steps.scope.outputs.light_r_required == 'true'
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        if: steps.scope.outputs.full_required == 'true'
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        if: steps.scope.outputs.full_required == 'true'
        with:
          upload-snapshots: true

      - name: Fast pass for ignored-source/process change
        if: steps.scope.outputs.full_required != 'true'
        shell: bash
        run: |
          set -euo pipefail

          changed_file_args=()
          collect_changed_files() {
            changed_file_args=()
            while IFS= read -r path; do
              [[ -n "$path" ]] && changed_file_args+=("$path")
            done < <(git diff --name-only "$@")
          }

          diff_check() {
            git diff --check "$@"
          }

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags origin "+refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
            base_ref="origin/${{ github.base_ref }}"
            collect_changed_files "${base_ref}...HEAD"
            diff_check "${base_ref}...HEAD"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" != "tag" ]]; then
            before="${{ github.event.before }}"
            if [[ "$before" =~ ^0+$ ]]; then
              echo "No fast-path diff available for this event; classifier should have required full R CMD check."
              exit 1
            fi
            collect_changed_files "$before" "${{ github.sha }}"
            diff_check "$before" "${{ github.sha }}"
          else
            echo "No fast-path diff available for this event; classifier should have required full R CMD check."
            exit 1
          fi

          r_files=()
          for path in "${changed_file_args[@]}"; do
            case "$path" in
              dev/*.R|dev/**/*.R)
                [[ -f "$path" ]] && r_files+=("$path")
                ;;
            esac
          done

          if [[ "${{ steps.scope.outputs.light_r_required }}" == "true" ]]; then
            if [[ ${#r_files[@]} -eq 0 ]]; then
              echo "Expected changed dev/*.R files but found none."
              exit 1
            fi
            Rscript --vanilla -e 'files <- commandArgs(TRUE); for (f in files) parse(file = f)' "${r_files[@]}"
          fi

          {
            echo "### Fast-path validation"
            echo
            echo "Full R CMD check skipped: ${{ steps.scope.outputs.reason }}"
            echo
            echo "Validation run:"
            echo "- \`git diff --check\` on the changed-file range"
            if [[ ${#r_files[@]} -gt 0 ]]; then
              echo "- \`Rscript parse(file = ...)\` for changed ignored dev R scripts"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
