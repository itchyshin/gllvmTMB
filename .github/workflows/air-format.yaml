on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

name: air-format

# During the trial period (2026-05-12 onward) this job runs in
# advisory mode: the format check is visible in the PR Checks tab
# but does not block merges. Once the existing codebase has been
# reformatted in a dedicated PR, flip `continue-on-error` to
# `false` to enforce.

jobs:
  air-format:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install Air formatter
        run: |
          curl -LsSf https://github.com/posit-dev/air/releases/latest/download/air-installer.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run air format --check
        run: |
          air --version
          air format --check .
