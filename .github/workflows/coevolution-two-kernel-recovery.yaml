name: coevolution-two-kernel-recovery

# Design 65 C3 cross-lineage coevolution two-kernel + identifiability gate.
#
# The standard R-CMD-check skips the heavy coevolution recovery cells
# (skip_if_not_heavy()), so this workflow runs the C3 two-kernel suite
# (test-coevolution-two-kernel.R) PLUS the existing C1 equivalence
# (test-kernel-equivalence.R) and C2 recovery (test-coevolution-recovery.R)
# suites as a regression check, all through the REAL public API with
# GLLVMTMB_HEAVY_TESTS=1.
#
# C3.1 is a STOP boundary: the single dense-relatedness engine slot cannot
# host two independent named kernel tiers, so the test pins the fail-loud
# rejection and the supported single-named-tier by-name extraction. C3.2 is
# the two-Psi identifiability guardrail (R/fit-multi.R drops a redundant
# uniqueness tier and cli_warn's when replication is absent).
#
# The run FAILS if any cell aborts at construction, fails an expectation, or
# errors. Skips do NOT fail (honest-skip on non-convergence / out-of-band
# recovery is the no-fake-pass rule).
#
# Triggered on pull_request (so it runs automatically on the C3 PR --
# pull_request events are not subject to the default-branch limit that
# workflow_dispatch has) AND workflow_dispatch (manual re-run). A paths:
# filter keeps it off PRs that do not touch the guardrail, the C++, the
# tests, or this workflow. The repo is public, so ubuntu-latest minutes are
# free. Uploads the test log as an artifact.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "R/fit-multi.R"
      - "R/brms-sugar.R"
      - "R/extract-sigma.R"
      - "src/gllvmTMB.cpp"
      - "tests/testthat/test-coevolution-two-kernel.R"
      - "tests/testthat/test-coevolution-recovery.R"
      - "tests/testthat/test-kernel-equivalence.R"
      - ".github/workflows/coevolution-two-kernel-recovery.yaml"

concurrency:
  group: coevolution-two-kernel-recovery-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # local::. brings the package's own deps; devtools::load_all
          # compiles src/ against them.
          extra-packages: |
            local::.
            any::devtools
          needs: check

      - name: Run the heavy C3 two-kernel suite + C1/C2 regression
        shell: bash
        run: |
          set -o pipefail
          GLLVMTMB_HEAVY_TESTS=1 Rscript -e '
            devtools::load_all(".")
            files <- c(
              "tests/testthat/test-coevolution-two-kernel.R",
              "tests/testthat/test-coevolution-recovery.R",
              "tests/testthat/test-kernel-equivalence.R"
            )
            total_fail <- 0L
            total_pass <- 0L
            total_skip <- 0L
            for (f in files) {
              cat(sprintf("\n=== %s ===\n", f))
              res <- testthat::test_file(
                f,
                reporter = "summary",
                stop_on_failure = FALSE
              )
              df <- as.data.frame(res)
              n_fail <- sum(df$failed) + sum(as.integer(df$error))
              total_fail <- total_fail + n_fail
              total_pass <- total_pass + sum(df$passed)
              total_skip <- total_skip + sum(df$skipped)
              cat(sprintf(
                "%s: %d failed, %d errored, %d skipped across %d tests\n",
                f, sum(df$failed), sum(as.integer(df$error)),
                sum(df$skipped), nrow(df)
              ))
              skipped <- df[df$skipped > 0L, , drop = FALSE]
              if (nrow(skipped) > 0L) {
                cat("Skipped cells:\n")
                for (i in seq_len(nrow(skipped))) {
                  cat(sprintf("  - %s\n", skipped$test[i]))
                }
              }
            }
            if (total_fail > 0L || (total_pass == 0L && total_skip > 0L)) {
              stop(sprintf(
                "C3 two-kernel suite + C1/C2 regression had %d failed expectation(s)/error(s) -- failing the CI gate",
                total_fail
              ))
            }
          ' 2>&1 | tee coevolution-two-kernel-recovery.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coevolution-two-kernel-recovery-log
          path: coevolution-two-kernel-recovery.log
          retention-days: 30
          if-no-files-found: warn
