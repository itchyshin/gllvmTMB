name: dep-slope-identifiability-sweep

# Accumulating dep-slope identifiability / recovery CAMPAIGN (GAP-B1 / PHY-18).
#
# Drives docs/dev-log/spikes/2026-06-01-phylo-dep-slope-identifiability-N-sweep.R
# (a research harness; NO engine change). Instead of re-running the same grid,
# each run ADDS a fresh batch of replicate seeds (derived from the run number,
# so seeds never collide) to a durable per-cell store on the orphan branch
# `dep-slope-sweep-results`. Non-default `s_grid` values write to an
# s-specific store so the scheduled single-slope campaign cannot overwrite a
# manual multi-slope feasibility sweep. The cumulative PD-fraction + recovery
# statistics therefore TIGHTEN over the week -- especially the seed-sensitive
# nbinom2 / ordinal_probit cells. Auto-stops after the campaign end date
# (default Sunday 2026-06-08). The repo is public, so ubuntu-latest minutes are
# free.
#
# POST-MERGE: the cron goes live on merge to main (schedules only fire from the
# default branch). Dispatch one manual run first to confirm the
# accumulate -> commit -> store cycle on GHA.

on:
  schedule:
    # Every 3 hours through the week -- accumulate a fresh seed batch per run.
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      families:
        description: "Comma list of families."
        required: false
        default: "gaussian,poisson,nbinom2,Gamma,Beta,binomial,ordinal_probit"
        type: string
      s_grid:
        description: "Comma list of random-slope counts s. Use 2 for the RE-03 multi-slope feasibility sweep."
        required: false
        default: "1"
        type: string
      n_grid:
        description: "Comma list of n_sp (campaign default is the decision N, 300/600)."
        required: false
        default: "300,600"
        type: string
      seeds_per_run:
        description: "How many FRESH seeds to add this run."
        required: false
        default: "3"
        type: string
      n_rep:
        description: "Rows per (species, trait) cell."
        required: false
        default: "10"
        type: string
      end_date:
        description: "Campaign auto-stops after this UTC date (YYYY-MM-DD)."
        required: false
        default: "2026-06-08"
        type: string

# Never overlap two accumulate runs (the store is a single CSV; a running
# batch must finish + persist before the next starts). Queue, do not cancel.
concurrency:
  group: dep-slope-sweep-campaign
  cancel-in-progress: false

permissions:
  contents: write

env:
  RESULTS_BRANCH: dep-slope-sweep-results
  DEFAULT_STORE: dep-slope-sweep-accumulated.csv

jobs:
  accumulate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - name: Campaign date guard (auto-stop after end_date)
        id: guard
        shell: bash
        run: |
          END="${{ github.event.inputs.end_date }}"; END="${END:-2026-06-08}"
          TODAY="$(date -u +%Y-%m-%d)"
          if [[ "$TODAY" > "$END" ]]; then
            echo "stop=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=dep-slope campaign::ended -- today $TODAY is past end_date $END; skipping."
          else
            echo "stop=false" >> "$GITHUB_OUTPUT"
            echo "campaign active: today $TODAY <= end_date $END"
          fi

      - name: Select accumulated store
        id: store
        if: steps.guard.outputs.stop != 'true'
        shell: bash
        run: |
          SGRID="${{ github.event.inputs.s_grid }}"; SGRID="${SGRID:-1}"
          if [[ "$SGRID" == "1" ]]; then
            STORE="$DEFAULT_STORE"
          else
            SAFE_SGRID="$(printf '%s' "$SGRID" | tr -c 'A-Za-z0-9._-' '-')"
            STORE="dep-slope-sweep-s${SAFE_SGRID}-accumulated.csv"
          fi
          echo "STORE=$STORE" >> "$GITHUB_ENV"
          echo "store=$STORE" >> "$GITHUB_OUTPUT"
          echo "using accumulated store: $STORE"

      - uses: r-lib/actions/setup-pandoc@v2
        if: steps.guard.outputs.stop != 'true'
      - uses: r-lib/actions/setup-r@v2
        if: steps.guard.outputs.stop != 'true'
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        if: steps.guard.outputs.stop != 'true'
        with:
          extra-packages: |
            local::.
            any::devtools
          needs: check

      - name: Restore accumulated store from the results branch
        if: steps.guard.outputs.stop != 'true'
        shell: bash
        run: |
          if git ls-remote --exit-code --heads origin "$RESULTS_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$RESULTS_BRANCH" --depth=1
            git archive FETCH_HEAD "$STORE" 2>/dev/null | tar -x \
              && echo "restored $STORE ($(wc -l < "$STORE") lines)" \
              || echo "results branch has no store yet; starting empty."
          else
            echo "results branch '$RESULTS_BRANCH' does not exist yet; starting empty."
          fi

      - name: Accumulate a fresh seed batch
        if: steps.guard.outputs.stop != 'true'
        shell: bash
        env:
          GLLVMTMB_SWEEP_FAMILIES: ${{ github.event.inputs.families }}
          GLLVMTMB_SWEEP_SGRID: ${{ github.event.inputs.s_grid }}
          GLLVMTMB_SWEEP_NGRID: ${{ github.event.inputs.n_grid }}
          GLLVMTMB_SWEEP_NREP: ${{ github.event.inputs.n_rep }}
          GLLVMTMB_SWEEP_STORE: ${{ steps.store.outputs.store }}
          GLLVMTMB_SWEEP_OUT: ${{ steps.store.outputs.store }}
        run: |
          set -o pipefail
          STEP="${{ github.event.inputs.seeds_per_run }}"; STEP="${STEP:-3}"
          # Fresh, non-colliding seeds keyed off the unique run number.
          BASE=$(( ${{ github.run_number }} * 100 ))
          SEEDS="$(seq -s, $((BASE + 1)) $((BASE + STEP)))"
          echo "adding fresh seeds: $SEEDS"
          GLLVMTMB_SWEEP_SEEDS="$SEEDS" \
            Rscript docs/dev-log/spikes/2026-06-01-phylo-dep-slope-identifiability-N-sweep.R \
            2>&1 | tee dep-slope-campaign.log

      - name: Commit accumulated store to the results branch (single writer)
        if: steps.guard.outputs.stop != 'true'
        shell: bash
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -e
          [ -f "$STORE" ] || { echo "no store produced; nothing to persist."; exit 0; }
          WORK="$(mktemp -d)"
          git clone --no-checkout --depth=1 \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" "$WORK"
          cd "$WORK"
          if git ls-remote --exit-code --heads origin "$RESULTS_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$RESULTS_BRANCH" --depth=1
            git checkout -B "$RESULTS_BRANCH" FETCH_HEAD
          else
            git checkout --orphan "$RESULTS_BRANCH"
            git rm -rf . >/dev/null 2>&1 || true
          fi
          cp -f "$GITHUB_WORKSPACE/$STORE" "$STORE"
          git add -A "$STORE"
          if git diff --cached --quiet; then echo "no store change."; exit 0; fi
          git commit -m "dep-slope campaign: accumulate seeds (run ${{ github.run_number }})"
          for i in 1 2 3; do
            git push origin "$RESULTS_BRANCH" && { echo "pushed store."; break; }
            echo "push attempt $i failed; refetch + retry."
            git fetch origin "$RESULTS_BRANCH" --depth=1 && git merge -X ours --no-edit FETCH_HEAD || true
          done

      - name: Upload this run's log + accumulated store (backup)
        if: always() && steps.guard.outputs.stop != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dep-slope-campaign-run-${{ github.run_number }}
          path: |
            ${{ steps.store.outputs.store }}
            dep-slope-campaign.log
          retention-days: 30
          if-no-files-found: warn

      - name: Job summary (cumulative PD-fraction + accumulated seed count)
        if: always() && steps.guard.outputs.stop != 'true'
        shell: bash
        run: |
          {
            echo "## dep-slope identifiability campaign -- run ${{ github.run_number }}"
            echo ""
            echo "Store branch: \`${RESULTS_BRANCH}\` | end_date guard: \`${{ github.event.inputs.end_date }}\`"
            echo ""
            if [ -f dep-slope-campaign.log ]; then
              echo "### Cumulative table (PD-fraction + accumulated seeds per cell)"
              echo '```'
              sed -n '/CUMULATIVE FRACTION/,/IDENTIFIABILITY_SWEEP_DONE/p' dep-slope-campaign.log
              echo '```'
            else
              echo ":warning: no campaign log produced -- see the run log."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
