name: dep-slope-poisson-recovery

# GAP-B1 (PHY-18) poisson dep-slope RECOVERY gate.
#
# The standard R-CMD-check skips the heavy phylo_dep recovery cells
# (skip_if_not_heavy()), so this workflow runs the heavy
# test-matrix-slope-phylo-dep.R suite -- including the new poisson
# VALIDATION cell -- through the REAL public API with
# GLLVMTMB_HEAVY_TESTS=1. It is the CI gate behind the R/fit-multi.R
# family-guard relaxation (phylo_dep allowlist c(0L, 2L)): the run FAILS
# if the poisson real-API fit aborts, fails to converge with a PD Hessian,
# or recovers the slope variances outside the inherited 4x poisson band.
#
# Triggered on BOTH pull_request (so it runs automatically on the GAP-B1
# PR -- pull_request events are not subject to the default-branch limit
# that workflow_dispatch has) AND workflow_dispatch (manual re-run). The
# repo is public, so ubuntu-latest minutes are free. Uploads the test log
# as an artifact.

on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: dep-slope-poisson-recovery-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # local::. brings the package's own deps; devtools::load_all
          # compiles src/ against them.
          extra-packages: |
            local::.
            any::devtools
          needs: check

      - name: Run the heavy phylo_dep poisson recovery cell
        shell: bash
        run: |
          set -o pipefail
          GLLVMTMB_HEAVY_TESTS=1 Rscript -e '
            devtools::load_all(".")
            res <- testthat::test_file(
              "tests/testthat/test-matrix-slope-phylo-dep.R",
              reporter = "summary",
              stop_on_failure = FALSE
            )
            df <- as.data.frame(res)
            n_fail <- sum(df$failed) + sum(as.integer(df$error))
            cat(sprintf(
              "\nphylo_dep suite: %d failed, %d errored, %d skipped across %d tests\n",
              sum(df$failed), sum(as.integer(df$error)),
              sum(df$skipped), nrow(df)
            ))
            if (n_fail > 0L) {
              stop(sprintf(
                "phylo_dep recovery suite had %d failed expectation(s)/error(s) -- failing the CI gate",
                n_fail
              ))
            }
          ' 2>&1 | tee dep-slope-poisson-recovery.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dep-slope-poisson-recovery-log
          path: dep-slope-poisson-recovery.log
          retention-days: 30
          if-no-files-found: warn
