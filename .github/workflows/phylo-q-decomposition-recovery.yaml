name: phylo-q-decomposition-recovery

# FG-12 / PHY-02 / PHY-03 phylogenetic q-decomposition RECOVERY gate.
#
# `test-phylo-q-decomposition.R` is the ONLY evidence cited by register row
# PHY-03 ("Three-piece phylo fallback"), and is one of two sources for PHY-02
# and one of five for FG-12. Every one of its cells is behind
# `skip_if_not_heavy()`, so routine R-CMD-check never runs it -- and until
# 2026-07-08 no workflow referenced the file at all. It sat red on `main`
# (a locale-sensitive optimiser status assertion, since fixed) without any
# gate noticing. This workflow closes that hole: the evidence behind a
# `covered` register row must be executed by CI.
#
# It recovers sigma2_P (phylo species variance) and sigma2_Q (non-phylo
# species variance, the q_it term of the Nakagawa et al. functional-
# biogeography framework) on a crossed site x species design at
# n_species = 100. The run FAILS if any cell aborts, fails to reach a usable
# optimum (see `expect_converged()` in tests/testthat/setup.R), or recovers
# the species variances outside the declared 50% relative-error band.
#
# Triggered on BOTH pull_request (paths-filtered) and workflow_dispatch
# (manual re-run). Linux-only: the cross-OS check belongs to the
# pre-release full-check, not to every PR.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "R/fit-multi.R"
      - "src/gllvmTMB.cpp"
      - "tests/testthat/test-phylo-q-decomposition.R"
      - "tests/testthat/setup.R"
      - ".github/workflows/phylo-q-decomposition-recovery.yaml"

concurrency:
  group: phylo-q-decomposition-recovery-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            local::.
            any::devtools
          needs: check

      - name: Run the heavy phylo q-decomposition recovery cells
        shell: bash
        run: |
          set -o pipefail
          GLLVMTMB_HEAVY_TESTS=1 Rscript -e '
            devtools::load_all(".")
            res <- testthat::test_file(
              "tests/testthat/test-phylo-q-decomposition.R",
              reporter = "summary",
              stop_on_failure = FALSE
            )
            df <- as.data.frame(res)
            n_fail <- sum(df$failed) + sum(as.integer(df$error))
            cat(sprintf(
              "\nphylo q-decomposition suite: %d failed, %d errored, %d skipped across %d tests\n",
              sum(df$failed), sum(as.integer(df$error)),
              sum(df$skipped), nrow(df)
            ))
            skipped <- df[df$skipped > 0L, , drop = FALSE]
            if (nrow(skipped) > 0L) {
              cat("Skipped cells:\n")
              for (i in seq_len(nrow(skipped))) {
                cat(sprintf("  - %s\n", skipped$test[i]))
              }
              stop("phylo q-decomposition cells were SKIPPED -- the gate must execute them")
            } else {
              cat("Skipped cells: none\n")
            }
            if (n_fail > 0L) {
              stop(sprintf(
                "phylo q-decomposition suite had %d failed expectation(s)/error(s) -- failing the CI gate",
                n_fail
              ))
            }
          ' 2>&1 | tee phylo-q-decomposition-recovery.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phylo-q-decomposition-recovery-log
          path: phylo-q-decomposition-recovery.log
          retention-days: 30
          if-no-files-found: warn
