on:
  workflow_run:
    workflows: ["R-CMD-check"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

name: pkgdown

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pkgdown
  # Never cancel an in-flight deploy. The deploy job is short and idempotent
  # (it re-publishes the rendered site). Cancelling it buys nothing, but when
  # several merges land in quick succession it was killing good-tree deploys
  # mid-publish while letting a stale-tree deploy run to a failed completion.
  # Let every deploy finish; the last one to run wins.
  cancel-in-progress: false

jobs:
  pkgdown:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v5
        with:
          # Build the current tip of the branch the check ran on, NOT the
          # triggering run's pinned head_sha. R-CMD-check does not cancel main
          # runs, so several can run concurrently for different commits; when an
          # older run finishes late it fires this deploy with its stale head_sha
          # and rebuilds a superseded tree. That is exactly how a deploy of
          # commit a4310885 (before #394 indexed impute_model / imputed) failed
          # with "2 topics missing from index" even though main was already
          # fixed. Checking out the branch ref deploys whatever is currently on
          # main; workflow_dispatch falls back to the dispatched ref.
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - uses: actions/configure-pages@v5

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Hide internal maintainer files from pkgdown
        # pkgdown 2.2.0 renders every root .md (including agent instructions,
        # the maintainer workflow, and the internal roadmap) as a public page
        # and indexes it in search.json / sitemap.xml, honoring neither
        # .Rbuildignore nor an exclude config. Move those files out of pkgdown's
        # view so no page, search entry, or sitemap entry is produced. The CI
        # checkout is ephemeral; the restore step is hygiene only.
        run: mkdir -p .pkgdown-hidden && mv AGENTS.md CLAUDE.md CONTRIBUTING.md ROADMAP.md .pkgdown-hidden/
        shell: bash

      - name: Build site
        run: pkgdown::build_site(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Restore internal maintainer files
        if: always()
        run: mv .pkgdown-hidden/AGENTS.md .pkgdown-hidden/CLAUDE.md .pkgdown-hidden/CONTRIBUTING.md .pkgdown-hidden/ROADMAP.md . && rmdir .pkgdown-hidden
        shell: bash

      - uses: actions/upload-pages-artifact@v4
        with:
          # Matches `destination: pkgdown-site` in _pkgdown.yml.
          # `docs/` hosts design + dev-log scaffolding, not the rendered site.
          path: pkgdown-site

      - id: deployment
        uses: actions/deploy-pages@v4
