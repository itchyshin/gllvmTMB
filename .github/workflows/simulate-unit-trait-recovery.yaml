name: simulate-unit-trait-recovery

# simulate_unit_trait() between-unit Lambda_B RECOVERY gate.
#
# The standard R-CMD-check skips the heavy simulate_unit_trait() recovery
# cell (skip_if_not_heavy() + skip_on_cran()), so this workflow runs the
# whole test-simulate-unit-trait.R suite -- including the heavy recovery
# cell that fits a between-unit reduced-rank latent block plus a within-unit
# unique() diagonal block through the REAL public API -- with
# GLLVMTMB_HEAVY_TESTS=1. It is the CI gate behind the test-only fix that
# adds `unit_obs = "unit_observation"` to the recovery fit call: the run
# FAILS if any cell aborts at construction, fails an expectation, or errors.
# Skips do NOT fail (honest-skip on non-convergence / non-PD / out-of-band
# recovery is the no-fake-pass rule).
#
# Triggered on pull_request (so it runs automatically on the fix PR --
# pull_request events are not subject to the default-branch limit that
# workflow_dispatch has) AND workflow_dispatch (manual re-run). A paths:
# filter keeps it off PRs that do not touch the test or this workflow. The
# repo is public, so ubuntu-latest minutes are free. Uploads the test log
# as an artifact.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "tests/testthat/test-simulate-unit-trait.R"
      - ".github/workflows/simulate-unit-trait-recovery.yaml"

concurrency:
  group: simulate-unit-trait-recovery-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # local::. brings the package's own deps; devtools::load_all
          # compiles src/ against them.
          extra-packages: |
            local::.
            any::devtools
          needs: check

      - name: Run the heavy simulate_unit_trait recovery cell
        shell: bash
        run: |
          set -o pipefail
          GLLVMTMB_HEAVY_TESTS=1 Rscript -e '
            devtools::load_all(".")
            res <- testthat::test_file(
              "tests/testthat/test-simulate-unit-trait.R",
              reporter = "summary",
              stop_on_failure = FALSE
            )
            df <- as.data.frame(res)
            n_fail <- sum(df$failed) + sum(as.integer(df$error))
            cat(sprintf(
              "\nsimulate_unit_trait suite: %d failed, %d errored, %d skipped across %d tests\n",
              sum(df$failed), sum(as.integer(df$error)),
              sum(df$skipped), nrow(df)
            ))
            skipped <- df[df$skipped > 0L, , drop = FALSE]
            if (nrow(skipped) > 0L) {
              cat("Skipped cells:\n")
              for (i in seq_len(nrow(skipped))) {
                cat(sprintf("  - %s\n", skipped$test[i]))
              }
            }
            if (n_fail > 0L) {
              stop(sprintf(
                "simulate_unit_trait recovery suite had %d failed expectation(s)/error(s) -- failing the CI gate",
                n_fail
              ))
            }
          ' 2>&1 | tee simulate-unit-trait-recovery.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulate-unit-trait-recovery-log
          path: simulate-unit-trait-recovery.log
          retention-days: 30
          if-no-files-found: warn
