name: slope-grid-residuals-recovery

# Slope-grid residuals RECOVERY gate (#350 nbinom1, animal_dep confirmation).
#
# The standard R-CMD-check skips the heavy slope recovery cells
# (skip_if_not_heavy()), so this workflow runs the two heavy suites that carry
# the new cells -- through the REAL public API with GLLVMTMB_HEAVY_TESTS=1:
#
#   * test-matrix-slope-phylo-dep.R -- the new nbinom1 (family id 15)
#     *_VALIDATION cell, the LAST missing family in the structured non-Gaussian
#     slope grid (#350). It is the CI gate behind the R/fit-multi.R slope
#     family-guard relaxation that adds nbinom1 (15L) to the six slope
#     allowlists. nbinom1's augmented-slope identifiability was genuinely
#     uncertain (#350: smoke-only even intercept-only), so CI decides: if the
#     cell recovers NON-SKIPPED, nbinom1 stays on the allowlists; if it skips,
#     nbinom1 is removed and reserved fail-loud.
#
#   * test-animal-dep-slope-gaussian.R -- the new animal_dep(1 + x | id) x
#     poisson VALIDATION cell (ANI-12), the confirmation recovery cell for the
#     known-pedigree non-Gaussian dep slope (already admitted via the shared
#     use_phylo_dep_slope guard, but previously without a dedicated cell).
#
# The run FAILS if any cell aborts at construction, fails an expectation, or
# errors. Skips do NOT fail (honest-skip on non-convergence / out-of-band
# recovery is the no-fake-pass rule). A paths: filter keeps it off PRs that do
# not touch the engine guard, the C++, the tests, or this workflow. The repo is
# public, so ubuntu-latest minutes are free. Uploads the test log as an
# artifact.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "R/fit-multi.R"
      - "src/gllvmTMB.cpp"
      - "tests/testthat/test-matrix-slope-phylo-dep.R"
      - "tests/testthat/test-animal-dep-slope-gaussian.R"
      - ".github/workflows/slope-grid-residuals-recovery.yaml"

concurrency:
  group: slope-grid-residuals-recovery-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # local::. brings the package's own deps; devtools::load_all
          # compiles src/ against them.
          extra-packages: |
            local::.
            any::devtools
          needs: check

      - name: Run the heavy slope-grid residual recovery cells
        shell: bash
        run: |
          set -o pipefail
          GLLVMTMB_HEAVY_TESTS=1 Rscript -e '
            devtools::load_all(".")
            files <- c(
              "tests/testthat/test-matrix-slope-phylo-dep.R",
              "tests/testthat/test-animal-dep-slope-gaussian.R"
            )
            n_fail_total <- 0L
            for (f in files) {
              res <- testthat::test_file(
                f, reporter = "summary", stop_on_failure = FALSE
              )
              df <- as.data.frame(res)
              n_fail <- sum(df$failed) + sum(as.integer(df$error))
              n_fail_total <- n_fail_total + n_fail
              cat(sprintf(
                "\n%s: %d failed, %d errored, %d skipped across %d tests\n",
                basename(f), sum(df$failed), sum(as.integer(df$error)),
                sum(df$skipped), nrow(df)
              ))
              skipped <- df[df$skipped > 0L, , drop = FALSE]
              if (nrow(skipped) > 0L) {
                cat("Skipped cells:\n")
                for (i in seq_len(nrow(skipped))) {
                  cat(sprintf("  - %s\n", skipped$test[i]))
                }
              } else {
                cat("Skipped cells: none\n")
              }
            }
            if (n_fail_total > 0L) {
              stop(sprintf(
                "slope-grid residual recovery suite had %d failed expectation(s)/error(s) -- failing the CI gate",
                n_fail_total
              ))
            }
          ' 2>&1 | tee slope-grid-residuals-recovery.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slope-grid-residuals-recovery-log
          path: slope-grid-residuals-recovery.log
          retention-days: 30
          if-no-files-found: warn
