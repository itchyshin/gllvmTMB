name: spatial-dep-slope-nongaussian-recovery

# SPA-10 spatial_dep(1 + x | coords) non-Gaussian slope RECOVERY gate.
#
# The standard R-CMD-check skips the heavy spatial_dep slope recovery cells
# (skip_if_not_heavy()), so this workflow runs the heavy
# test-spatial-dep-slope-nongaussian.R suite -- the per-family VALIDATION
# cells (poisson, Gamma, Beta, binomial multi-trial, nbinom2, ordinal_probit)
# -- through the REAL public API with GLLVMTMB_HEAVY_TESTS=1. It is the CI gate
# behind the R/fit-multi.R use_spde_dep_slope family-guard relaxation (the FULL
# unstructured 2T x 2T field-covariance allowlist, the spatial analogue of
# phylo_dep / PHY-18). The run FAILS if any cell aborts at construction, fails
# an expectation, or errors. Skips do NOT fail (honest-skip on non-convergence
# / out-of-band recovery is the no-fake-pass rule). This supersedes the retired
# #425 hand-rolled-precision spike; the cells fit the package's own validated
# Gaussian spatial DGP.
#
# Triggered on pull_request (so it runs automatically on the SPA-10 PR --
# pull_request events are not subject to the default-branch limit that
# workflow_dispatch has) AND workflow_dispatch (manual re-run). A paths: filter
# keeps it off PRs that do not touch the engine guard, the C++, the test, or
# this workflow. The repo is public, so ubuntu-latest minutes are free. Uploads
# the test log as an artifact.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "R/fit-multi.R"
      - "src/gllvmTMB.cpp"
      - "tests/testthat/test-spatial-dep-slope-nongaussian.R"
      - ".github/workflows/spatial-dep-slope-nongaussian-recovery.yaml"

concurrency:
  group: spatial-dep-slope-nongaussian-recovery-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # local::. brings the package's own deps; devtools::load_all
          # compiles src/ against them.
          extra-packages: |
            local::.
            any::devtools
          needs: check

      - name: Run the heavy spatial_dep non-Gaussian recovery cells
        shell: bash
        run: |
          set -o pipefail
          GLLVMTMB_HEAVY_TESTS=1 Rscript -e '
            devtools::load_all(".")
            res <- testthat::test_file(
              "tests/testthat/test-spatial-dep-slope-nongaussian.R",
              reporter = "summary",
              stop_on_failure = FALSE
            )
            df <- as.data.frame(res)
            n_fail <- sum(df$failed) + sum(as.integer(df$error))
            n_skip <- sum(df$skipped); n_pass <- sum(df$passed)
            ## Vacuity guard (audit 2026-07-08): a recovery gate that exercises no
            ## cell -- everything skipped -- must not report green.
            if (n_pass == 0L && n_skip > 0L) {
              stop(sprintf(
                "recovery gate exercised no cell: %d passed, %d skipped, %d failed/errored -- a gate that skips everything must not pass",
                n_pass, n_skip, n_fail
              ))
            }
            cat(sprintf(
              "\nspatial_dep non-Gaussian suite: %d failed, %d errored, %d skipped across %d tests\n",
              sum(df$failed), sum(as.integer(df$error)),
              sum(df$skipped), nrow(df)
            ))
            skipped <- df[df$skipped > 0L, , drop = FALSE]
            if (nrow(skipped) > 0L) {
              cat("Skipped cells:\n")
              for (i in seq_len(nrow(skipped))) {
                cat(sprintf("  - %s\n", skipped$test[i]))
              }
            }
            if (n_fail > 0L) {
              stop(sprintf(
                "spatial_dep non-Gaussian recovery suite had %d failed expectation(s)/error(s) -- failing the CI gate",
                n_fail
              ))
            }
          ' 2>&1 | tee spatial-dep-slope-nongaussian-recovery.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spatial-dep-slope-nongaussian-recovery-log
          path: spatial-dep-slope-nongaussian-recovery.log
          retention-days: 30
          if-no-files-found: warn
