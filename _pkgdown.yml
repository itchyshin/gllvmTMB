url: https://itchyshin.github.io/gllvmTMB/
# Build pkgdown site to a separate directory so `docs/` can host the
# project's design notes and dev-log (drmTMB-style scaffolding).
# Matches drmTMB's _pkgdown.yml convention.
destination: pkgdown-site
template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#052b3f"
    headings-color: "#10283d"
    link-color: "#0a617d"
  opengraph:
    image:
      src: man/figures/logo.png
      alt: "gllvmTMB hex logo"

navbar:
  structure:
    left:  [intro, model_guides, concepts, diagnostics, developer, roadmap, reference, news]
    right: [search, github]
  components:
    model_guides:
      text: Model Guides
      menu:
      - text: First Gaussian morphology model
        href: articles/morphometrics.html
      - text: Choosing latent rank
        href: articles/model-selection-latent-rank.html
      - text: Joint species distribution model
        href: articles/joint-sdm.html
      - text: Confirmatory loadings
        href: articles/lambda-constraint.html
      - text: Suggesting Lambda constraint
        href: articles/lambda-constraint-suggest.html
      - text: Handling missing data
        href: articles/missing-data.html
    concepts:
      text: Concepts
      menu:
      - text: Plain-English vocabulary
        href: articles/gllvm-vocabulary.html
      - text: Covariance and correlation
        href: articles/covariance-correlation.html
      - text: Formula keyword grid
        href: articles/api-keyword-grid.html
      - text: Fixed predictor effects
        href: articles/fixed-effect-zero-constraints.html
      - text: Response families
        href: articles/response-families.html
    diagnostics:
      text: Diagnostics & Validation
      menu:
      - text: Screen binary traits before fitting
        href: articles/pre-fit-response-screening.html
      - text: Can I trust this fit?
        href: articles/fit-diagnostics.html
      - text: Convergence and start values
        href: articles/convergence-start-values.html
      - text: Profile-likelihood confidence intervals
        href: articles/profile-likelihood-ci.html
      - text: Troubleshooting profile-likelihood CIs
        href: articles/troubleshooting-profile.html
      - text: Common pitfalls
        href: articles/pitfalls.html
    developer:
      text: Developer Notes
      menu:
      - text: Under-audit model drafts
      - text: Data-shape flowchart
        href: articles/data-shape-flowchart.html
      - text: How to choose your model
        href: articles/choose-your-model.html
      - text: Animal model
        href: articles/animal-model.html
      - text: Phylogenetic trait covariance
        href: articles/phylogenetic-gllvm.html
      - text: Behavioural reaction norms
        href: articles/random-regression-reaction-norms.html
      - text: Structured non-Gaussian slopes
        href: articles/random-slopes-nongaussian.html
      - text: Cross-lineage coevolution kernels
        href: articles/cross-lineage-coevolution.html
      - text: Behavioural syndromes
        href: articles/behavioural-syndromes.html
      - text: Mixed-family extractor notes
        href: articles/mixed-family-extractors.html
      - text: Ordinal-probit traits
        href: articles/ordinal-probit.html
      - text: Stacked-trait GLLVM note
        href: articles/stacked-trait-gllvm.html
      - text: Functional biogeography capstone
        href: articles/functional-biogeography.html
      - text: Psychometrics / IRT draft
        href: articles/psychometrics-irt.html
      - text: Validation and comparison notes
      - text: Cross-package validation
        href: articles/cross-package-validation.html
      - text: Simulation recovery
        href: articles/simulation-recovery-validated.html
      - text: Simulation verification
        href: articles/simulation-verification.html
    roadmap:
      text: Roadmap
      href: articles/roadmap.html

