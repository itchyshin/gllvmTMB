url: https://itchyshin.github.io/gllvmTMB/
# Build pkgdown site to a separate directory so `docs/` can host the
# project's design notes and dev-log (drmTMB-style scaffolding).
# Matches drmTMB's _pkgdown.yml convention.
destination: pkgdown-site
template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#052b3f"
    headings-color: "#10283d"
    link-color: "#0a617d"
  opengraph:
    image:
      src: man/figures/logo.png
      alt: "gllvmTMB hex logo"

navbar:
  structure:
    left:  [intro, model_guides, concepts, diagnostics, reference, news]
    right: [search, github]
  components:
    intro:
      text: Get started
      menu:
      - text: Get started with gllvmTMB
        href: articles/gllvmTMB.html
      - text: Function map and cheat sheet
        href: articles/function-map-cheatsheet.html
    model_guides:
      text: Model Guides
      menu:
      - text: First Gaussian morphology model
        href: articles/morphometrics.html
      - text: Behavioural syndromes in repeated measurements
        href: articles/behavioural-syndromes.html
      - text: Behavioural reaction norms with random slopes
        href: articles/random-regression-reaction-norms.html
      - text: Choosing latent rank
        href: articles/model-selection-latent-rank.html
      - text: Joint species distribution model
        href: articles/joint-sdm.html
      - text: Phylogenetic covariance among traits
        href: articles/phylogenetic-gllvm.html
      - text: Handling missing data
        href: articles/missing-data.html
    concepts:
      text: Concepts
      menu:
      - text: Plain-English vocabulary
        href: articles/gllvm-vocabulary.html
      - text: Covariance and correlation
        href: articles/covariance-correlation.html
      - text: Formula keyword grid
        href: articles/api-keyword-grid.html
      - text: Response-specific predictor effects
        href: articles/fixed-effect-zero-constraints.html
      - text: Choose a response family
        href: articles/response-families.html
    diagnostics:
      text: Diagnostics
      menu:
      - text: Screen binary traits before fitting
        href: articles/pre-fit-response-screening.html
      - text: Can I trust this fit?
        href: articles/fit-diagnostics.html
      - text: Convergence and start values
        href: articles/convergence-start-values.html
      - text: Profile-likelihood confidence intervals
        href: articles/profile-likelihood-ci.html
      - text: Common pitfalls
        href: articles/pitfalls.html

articles:
  - title: Model Guides
    contents:
    - articles/morphometrics
    - articles/behavioural-syndromes
    - articles/random-regression-reaction-norms
    - articles/model-selection-latent-rank
    - articles/joint-sdm
    - articles/phylogenetic-gllvm
    - articles/missing-data

  - title: Concepts
    contents:
    - articles/gllvm-vocabulary
    - articles/covariance-correlation
    - articles/api-keyword-grid
    - articles/fixed-effect-zero-constraints
    - articles/response-families

  - title: Diagnostics and validation
    contents:
    - articles/pre-fit-response-screening
    - articles/fit-diagnostics
    - articles/convergence-start-values
    - articles/profile-likelihood-ci
    - articles/pitfalls

reference:
  - title: Start here
    desc: Fit a stacked-trait GLLVM and load beginner-friendly examples
    contents:
    - gllvmTMB
    - traits
    - gllvmTMBcontrol
    - miss_control
    - impute_model

  - title: Core covariance keywords
    desc: Start with the ordinary decomposition, diagonal baseline, or full covariance before adding a relationship source
    contents:
    - latent
    - indep
    - dep

  - title: Advanced formula keywords and shorthands
    desc: Useful after the core grid is familiar; public articles prefer the explicit core keywords
    contents:
    - animal_slope
    - phylo_slope
    - phylo
    - spatial

  - title: Relatedness and spatial helpers
    desc: Build relationship matrices, sparse precisions, meshes, and spatial diagnostics
    contents:
    - pedigree_to_A
    - pedigree_to_Ainv_sparse
    - make_cross_kernel
    - profile_cross_rho
    - profile_cross_rho_ci
    - diagnose_kernel_separability
    - make_mesh
    - plot.sdmTMBmesh
    - add_utm_columns
    - get_crs
    - plot_anisotropy
    - plot_anisotropy2

  - title: Response families
    desc: >
      Match response support and sampling process before adding covariance.
      Several exported compatibility constructors still stop explicitly rather
      than fitting an unsupported model; the response-family article states the
      current reader-facing boundary.
    contents:
    - Families
    - Beta
    - lognormal
    - gamma_mix
    - lognormal_mix
    - nbinom2_mix
    - nbinom2
    - nbinom1
    - truncated_poisson
    - truncated_nbinom2
    - truncated_nbinom1
    - student
    - tweedie
    - censored_poisson
    - delta_gamma
    - delta_gamma_mix
    - delta_gengamma
    - delta_lognormal
    - delta_lognormal_mix
    - delta_truncated_nbinom2
    - delta_truncated_nbinom1
    - betabinomial
    - delta_beta
    - ordinal_probit

  - title: Predictor-model families (modelled missing predictors)
    desc: >
      Not response families: these tag the submodel for a categorical or
      ordered *predictor* in the modelled missing-predictor workflow (`impute_model()` /
      `mi()`), not a response distribution.
    contents:
    - categorical
    - cumulative_logit

  - title: Source-specific covariance keywords
    desc: Add a pedigree, phylogeny, spatial field, supplied kernel, or known-variance structure only when the study design requires it
    contents:
    - animal_scalar
    - animal_indep
    - animal_dep
    - animal_latent
    - pedigree_to_A
    - pedigree_to_Ainv_sparse
    - phylo_scalar
    - phylo_indep
    - phylo_dep
    - phylo_latent
    - spatial_scalar
    - spatial_indep
    - spatial_dep
    - spatial_latent
    - kernel_latent
    - kernel_indep
    - kernel_dep
    - meta_V
    - block_V

  - title: Report-ready extractors
    desc: Recover covariance, correlation, ordination, repeatability, communality, phylogenetic signal, and variance proportions
    contents:
    - extract_Sigma
    - extract_Gamma
    - extract_coevolution_modules
    - predict_cross_covariance
    - extract_Sigma_table
    - compare_Sigma_table
    - extract_Omega
    - extract_communality
    - extract_correlations
    - extract_residual_cov
    - extract_residual_cor
    - extract_repeatability
    - extract_phylo_signal
    - extract_proportions
    - extract_ordination
    - extract_loadings
    - extract_lv_effects
    - extract_rotated_loadings_table
    - extract_cutpoints

  - title: Methods and plots on fitted models
    desc: Standard summaries, predictions, simulations, confidence intervals, and current plotting entry point
    contents:
    - print.gllvmTMB_multi
    - print.gllvmTMB_Sigma_phy_slope
    - summary.gllvmTMB_multi
    - print.summary.gllvmTMB_multi
    - logLik.gllvmTMB_multi
    - confint.gllvmTMB_multi
    - tidy.gllvmTMB_multi
    - simulate.gllvmTMB_multi
    - predict.gllvmTMB_multi
    - predict_missing
    - imputed
    - imputed.gllvmTMB
    - phylo_signal_mi
    - plot.gllvmTMB_multi
    - plot_correlations
    - plot_Sigma_table
    - plot_Sigma_heatmap
    - plot_Sigma_comparison

  - title: First-line diagnostics and uncertainty
    desc: Start here before interpreting covariance, ordination, or interval estimates
    contents:
    - screen_gllvmTMB
    - screen_control
    - screen_table
    - check_gllvmTMB
    - gllvmTMB_diagnose
    - predictive_check
    - diagnostic_table
    - residuals.gllvmTMB_multi
    - bootstrap_Sigma
    - confint_inspect
    - profile_phylo_signal
    - plot.profile_derived

  - title: Advanced validation utilities
    desc: Slower diagnostics for investigating a fitted model; none is a calibration certificate
    contents:
    - sanity_multi
    - check_auto_residual
    - gllvmTMB_check_consistency
    - compare_dep_vs_two_psi
    - compare_indep_vs_two_psi
    - profile_targets
    - tmbprofile_wrapper

  - title: Simulation helpers
    desc: Generate small stacked-trait fixtures for examples and known-data-generating checks
    contents:
    - simulate_site_trait
    - simulate_unit_trait

  - title: Loadings (Lambda) and confirmatory factor analysis
    desc: Extract, rotate, and constrain the loading matrix
    contents:
    - rotate_loadings
    - plot_rotated_loadings
    - compare_loadings
    - suggest_lambda_constraint
    - suggest_lambda_constraints
    - confirmatory_lambda
    - loading_ci
    - loading_profile
    - flag_unreliable_loadings
    - plot_loadings_confidence_eye
    - plot.profile_loadings

  - title: Profile-likelihood confidence intervals
    desc: Target-specific likelihood-profile routes and fallbacks; inspect each target and do not assume universal calibration
    contents:
    - profile_ci_phylo_signal

  - title: Experimental Julia bridge
    desc: Optional point-estimation bridge; use only after reading the explicit method limitations, and do not assume R/TMB feature parity
    contents:
    - gllvm_julia_fit
    - gllvm_julia_setup
    - gllvmTMB_julia-methods
    - logLik.gllvmTMB_julia
    - print.gllvmTMB_julia
    - coef.gllvmTMB_julia
    - predict.gllvmTMB_julia
    - fitted.gllvmTMB_julia
    - residuals.gllvmTMB_julia
    - simulate.gllvmTMB_julia
    - confint.gllvmTMB_julia
    - summary.gllvmTMB_julia
    - print.summary.gllvmTMB_julia

  - title: Deprecated covariance functions
    desc: Only the functions listed here are deprecated; the broader animal, phylogenetic, spatial, and kernel APIs remain current. Use indep / *_indep for standalone diagonal models and latent defaults for decomposed models
    contents:
    - unique
    - animal_unique
    - phylo_unique
    - spatial_unique
    - kernel_unique

  - title: Deprecated and compatibility aliases
    desc: Soft-deprecated spellings and gllvm-style accessors retained for migration; new code should prefer the canonical keywords and extract_*() functions
    contents:
    - gr
    - meta
    - meta_known_V
    - phylo_rr
    - spde
    - gllvmTMB_wide
    - extract_Sigma_B
    - extract_Sigma_W
    - extract_ICC_site
    - extract_residual_split
    - VP
    - delta_poisson_link_gamma
    - delta_poisson_link_lognormal
    - gengamma
    - getLV
    - getLoadings
    - getResidualCor
    - getResidualCov
    - ordiplot

## news.releases intentionally omitted until the maintainer creates a 0.5.0 tag
## and GitHub release. The current site is pre-release documentation.
##
## In the meantime, the navbar "News" dropdown will show only the
## "Changelog" entry (NEWS.md) — which is the correct pre-release UX.
