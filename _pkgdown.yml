url: https://itchyshin.github.io/gllvmTMB/
# Build pkgdown site to a separate directory so `docs/` can host the
# project's design notes and dev-log (drmTMB-style scaffolding).
# Matches drmTMB's _pkgdown.yml convention.
destination: pkgdown-site
template:
  bootstrap: 5

navbar:
  structure:
    left:  [intro, articles, roadmap, reference, news]
    right: [search, github]
  components:
    articles:
      text: Articles
      menu:
      - text: Model guide
      - text: Morphometrics
        href: articles/morphometrics.html
      - text: Concepts
      - text: Covariance and correlation
        href: articles/covariance-correlation.html
      - text: Formula keyword grid
        href: articles/api-keyword-grid.html
      - text: Response families
        href: articles/response-families.html
      - text: Methods
      - text: Convergence and start values
        href: articles/convergence-start-values.html
      - text: Common pitfalls
        href: articles/pitfalls.html
    roadmap:
      text: Roadmap
      href: articles/roadmap.html

articles:
  - title: Model guide
    contents:
    - articles/morphometrics

  - title: Concepts
    contents:
    - articles/covariance-correlation
    - articles/api-keyword-grid
    - articles/response-families

  - title: Methods
    contents:
    - articles/convergence-start-values
    - articles/pitfalls

  - title: internal
    desc: Draft, technical, or validation-dependent articles hidden from the public dropdown until their evidence and reader path are ready
    contents:
    - articles/animal-model
    - articles/behavioural-syndromes
    - articles/choose-your-model
    - articles/cross-package-validation
    - articles/data-shape-flowchart
    - articles/functional-biogeography
    - articles/gllvm-vocabulary
    - articles/joint-sdm
    - articles/lambda-constraint
    - articles/mixed-family-extractors
    - articles/ordinal-probit
    - articles/phylogenetic-gllvm
    - articles/profile-likelihood-ci
    - articles/psychometrics-irt
    - articles/simulation-recovery-validated
    - articles/simulation-verification
    - articles/stacked-trait-gllvm
    - articles/troubleshooting-profile
    - articles/roadmap

reference:
  - title: Top-level entry points
    desc: Fit a stacked-trait GLLVM
    contents:
    - gllvmTMB
    - traits
    - gllvmTMBcontrol
    - simulate_site_trait

  - title: Covariance keywords
    desc: The 4 x 5 keyword grid (correlation source x mode)
    contents:
    - latent
    - unique
    - indep
    - dep
    - animal_scalar
    - animal_unique
    - animal_indep
    - animal_dep
    - animal_latent
    - animal_slope
    - pedigree_to_A
    - pedigree_to_Ainv_sparse
    - phylo_scalar
    - phylo_unique
    - phylo_indep
    - phylo_dep
    - phylo_latent
    - phylo_slope
    - spatial_scalar
    - spatial_unique
    - spatial_indep
    - spatial_dep
    - spatial_latent
    - spde
    - spatial
    - meta_V
    - meta_known_V

  - title: Deprecated keyword aliases
    desc: Older keyword names kept for backward compatibility
    contents:
    - phylo
    - phylo_rr
    - gr
    - meta
    - block_V

  - title: Response families
    contents:
    - Families
    - ordinal_probit

  - title: Extractors
    desc: Recover Sigma, Lambda, repeatability, communality, phylogenetic signal
    contents:
    - extract_Sigma
    - extract_Omega
    - extract_communality
    - extract_correlations
    - extract_repeatability
    - extract_phylo_signal
    - extract_proportions
    - extract_residual_split
    - extract_ordination
    - extract_ICC_site
    - extract_cutpoints

  - title: S3 methods on `gllvmTMB_multi` fits
    contents:
    - print.gllvmTMB_multi
    - summary.gllvmTMB_multi
    - logLik.gllvmTMB_multi
    - confint.gllvmTMB_multi
    - tidy.gllvmTMB_multi
    - simulate.gllvmTMB_multi
    - predict.gllvmTMB_multi
    - plot.gllvmTMB_multi

  - title: Diagnostics
    desc: Evaluate a fitted gllvmTMB_multi model
    contents:
    - sanity_multi
    - check_gllvmTMB
    - gllvmTMB_diagnose
    - check_auto_residual
    - check_identifiability
    - gllvmTMB_check_consistency
    - compare_dep_vs_two_psi
    - compare_indep_vs_two_psi
    - bootstrap_Sigma
    - tmbprofile_wrapper
    - profile_targets
    - confint_inspect
    - coverage_study

  - title: Loadings (Lambda) and confirmatory factor analysis
    desc: Extract, rotate, and constrain the loading matrix
    contents:
    - rotate_loadings
    - compare_loadings
    - suggest_lambda_constraint

  - title: Spatial mesh helpers
    contents:
    - make_mesh
    - add_utm_columns
    - plot_anisotropy

## news.releases intentionally omitted pre-CRAN: the v0.2.0 git tag /
## GitHub release does not exist yet (we are mid Phase 1b on the path
## to first CRAN submission per ROADMAP.md). Once Phase 5 lands a real
## release tag, re-add a `releases:` block here pointing at it.
##
## In the meantime, the navbar "News" dropdown will show only the
## "Changelog" entry (NEWS.md) — which is the correct pre-release UX.
