url: https://itchyshin.github.io/gllvmTMB/
# Build pkgdown site to a separate directory so `docs/` can host the
# project's design notes and dev-log (drmTMB-style scaffolding).
# Matches drmTMB's _pkgdown.yml convention.
destination: pkgdown-site
template:
  bootstrap: 5

navbar:
  structure:
    left:  [intro, articles, roadmap, reference, news]
    right: [search, github]
  components:
    roadmap:
      text: Roadmap
      href: articles/roadmap.html

articles:
  - title: Model guides
    navbar: Model guides
    desc: Worked examples in complexity order
    contents:
    - articles/morphometrics
    - articles/joint-sdm
    - articles/behavioural-syndromes
    - articles/phylogenetic-gllvm
    - articles/functional-biogeography

  - title: Concepts and reference
    navbar: Concepts
    desc: Decision tree, concept articles, and API lookup
    contents:
    - articles/choose-your-model
    - articles/covariance-correlation
    - articles/pitfalls
    - articles/api-keyword-grid
    - articles/response-families
    - articles/ordinal-probit

  - title: Project
    navbar: ~
    desc: Project meta (roadmap, etc.) -- not in the articles dropdown; surfaced via a dedicated navbar entry
    contents:
    - articles/roadmap

reference:
  - title: Top-level entry points
    desc: Fit a stacked-trait GLLVM
    contents:
    - gllvmTMB
    - traits
    - gllvmTMBcontrol
    - simulate_site_trait

  - title: Covariance keywords
    desc: The 3 x 5 keyword grid (correlation x mode)
    contents:
    - latent
    - unique
    - indep
    - dep
    - phylo_scalar
    - phylo_unique
    - phylo_indep
    - phylo_dep
    - phylo_latent
    - phylo_slope
    - spatial_scalar
    - spatial_unique
    - spatial_indep
    - spatial_dep
    - spatial_latent
    - spde
    - spatial
    - meta_known_V

  - title: Deprecated keyword aliases
    desc: Older keyword names kept for backward compatibility
    contents:
    - phylo
    - phylo_rr
    - gr
    - meta
    - block_V

  - title: Response families
    contents:
    - has_keyword("families")
    - ordinal_probit

  - title: Extractors
    desc: Recover Sigma, Lambda, repeatability, communality, phylogenetic signal
    contents:
    - extract_Sigma
    - extract_Omega
    - extract_communality
    - extract_correlations
    - extract_repeatability
    - extract_phylo_signal
    - extract_proportions
    - extract_residual_split
    - extract_ordination
    - extract_ICC_site
    - extract_cutpoints

  - title: S3 methods on `gllvmTMB_multi` fits
    contents:
    - print.gllvmTMB_multi
    - summary.gllvmTMB_multi
    - logLik.gllvmTMB_multi
    - confint.gllvmTMB_multi
    - tidy.gllvmTMB_multi
    - simulate.gllvmTMB_multi
    - predict.gllvmTMB_multi
    - plot.gllvmTMB_multi

  - title: Diagnostics
    desc: Evaluate a fitted gllvmTMB_multi model
    contents:
    - sanity_multi
    - gllvmTMB_diagnose
    - bootstrap_Sigma
    - tmbprofile_wrapper

  - title: Loadings (Lambda) and confirmatory factor analysis
    desc: Extract, rotate, and constrain the loading matrix
    contents:
    - rotate_loadings
    - compare_loadings
    - suggest_lambda_constraint

  - title: Spatial mesh helpers
    contents:
    - make_mesh
    - add_utm_columns
    - plot_anisotropy

news:
  releases:
  - text: "Version 0.2.0"
    href: https://github.com/itchyshin/gllvmTMB/releases/tag/v0.2.0
