  - title: Under-audit model drafts
    desc: Buildable pages kept out of the first-click model-guide path until their evidence, examples, and rendered reader path are ready. They remain direct-link references for maintainers and contributors.
    contents:
    - articles/data-shape-flowchart
    - articles/choose-your-model
    - articles/animal-model
    - articles/phylogenetic-gllvm
    - articles/random-regression-reaction-norms
