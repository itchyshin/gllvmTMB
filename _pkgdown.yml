url: https://itchyshin.github.io/gllvmTMB/
# Build pkgdown site to a separate directory so `docs/` can host the
# project's design notes and dev-log (drmTMB-style scaffolding).
# Matches drmTMB's _pkgdown.yml convention.
destination: pkgdown-site
template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#052b3f"
    headings-color: "#10283d"
    link-color: "#0a617d"
  opengraph:
    image:
      src: man/figures/logo.png
      alt: "gllvmTMB hex logo"

navbar:
  structure:
    left:  [intro, articles, roadmap, reference, news]
    right: [search, github]
  components:
    articles:
      text: Articles
      menu:
      - text: Model guide
      - text: Morphometrics
        href: articles/morphometrics.html
      - text: Choosing latent rank
        href: articles/model-selection-latent-rank.html
      - text: Joint species distribution model
        href: articles/joint-sdm.html
      - text: Loading constraints
      - text: Confirmatory loadings
        href: articles/lambda-constraint.html
      - text: Suggesting Lambda constraint
        href: articles/lambda-constraint-suggest.html
      - text: Concepts
      - text: Plain-English vocabulary
        href: articles/gllvm-vocabulary.html
      - text: Covariance and correlation
        href: articles/covariance-correlation.html
      - text: Formula keyword grid
        href: articles/api-keyword-grid.html
      - text: Response families
        href: articles/response-families.html
      - text: Methods
      - text: Can I trust this fit?
        href: articles/fit-diagnostics.html
      - text: Convergence and start values
        href: articles/convergence-start-values.html
      - text: Common pitfalls
        href: articles/pitfalls.html
      - text: Handling missing data
        href: articles/missing-data.html
    roadmap:
      text: Roadmap
      href: articles/roadmap.html

articles:
  - title: Model guide
    contents:
    - articles/morphometrics
    - articles/model-selection-latent-rank
    - articles/joint-sdm

  - title: Loading constraints
    contents:
    - articles/lambda-constraint
    - articles/lambda-constraint-suggest

  - title: Concepts
    contents:
    - articles/gllvm-vocabulary
    - articles/covariance-correlation
    - articles/api-keyword-grid
    - articles/response-families

  - title: Methods
    contents:
    - articles/fit-diagnostics
    - articles/convergence-start-values
    - articles/pitfalls
    - articles/missing-data

  - title: Internal drafts and technical notes
    desc: Buildable pages kept out of the public dropdown until their evidence and reader path are ready. These are direct-link references for maintainers, not first-stop tutorials.
    contents:
    - articles/data-shape-flowchart
    - articles/choose-your-model
    - articles/animal-model
    - articles/phylogenetic-gllvm
    - articles/profile-likelihood-ci
    - articles/troubleshooting-profile
    - articles/random-regression-reaction-norms
    - articles/random-slopes-nongaussian
    - articles/cross-lineage-coevolution
    - articles/behavioural-syndromes
    - articles/mixed-family-extractors
    - articles/ordinal-probit
    - articles/stacked-trait-gllvm
    - articles/cross-package-validation
    - articles/functional-biogeography
    - articles/psychometrics-irt
    - articles/simulation-recovery-validated
    - articles/simulation-verification
    - articles/roadmap

reference:
  - title: Start here
    desc: Fit a stacked-trait GLLVM and load beginner-friendly examples
    contents:
    - gllvmTMB
    - traits
    - gllvmTMBcontrol
    - miss_control
    - impute_model
    - simulate_site_trait
    - simulate_unit_trait

  - title: Julia bridge
    desc: Experimental GLLVM.jl bridge fitting path; use the capability ledger before relying on a row
    contents:
    - gllvm_julia_capabilities
    - gllvm_julia_gate_registry
    - gllvm_julia_fit
    - gllvm_julia_setup
    - gllvmTMB_julia-methods

  - title: First-line covariance keywords
    desc: Formula keywords to teach first for the 4 x 5 grid; soft-deprecated explicit-Psi compatibility aliases are grouped below
    contents:
    - latent
    - indep
    - dep
    - animal_scalar
    - animal_indep
    - animal_dep
    - animal_latent
    - pedigree_to_A
    - pedigree_to_Ainv_sparse
    - phylo_scalar
    - phylo_indep
    - phylo_dep
    - phylo_latent
    - spatial_scalar
    - spatial_indep
    - spatial_dep
    - spatial_latent
    - kernel_latent
    - meta_V
    - block_V

  - title: Soft-deprecated covariance compatibility syntax
    desc: Explicit diagonal-Psi spellings retained for old formulas; new standalone diagonal examples use indep / *_indep, and ordinary decomposed examples use latent defaults
    contents:
    - unique
    - animal_unique
    - phylo_unique
    - spatial_unique
    - kernel_unique

  - title: Advanced formula keywords and shorthands
    desc: Useful after the core grid is familiar; public articles prefer the explicit core keywords
    contents:
    - animal_slope
    - phylo_slope
    - phylo
    - spatial

  - title: Relatedness and spatial helpers
    desc: Build relationship matrices, sparse precisions, meshes, and spatial diagnostics
    contents:
    - pedigree_to_A
    - pedigree_to_Ainv_sparse
    - make_cross_kernel
    - profile_cross_rho
    - profile_cross_rho_ci
    - diagnose_kernel_separability
    - make_mesh
    - add_utm_columns
    - plot_anisotropy

  - title: Response families
    contents:
    - Families
    - categorical
    - cumulative_logit
    - ordinal_probit

  - title: Report-ready extractors
    desc: Recover covariance, correlation, ordination, repeatability, communality, phylogenetic signal, and variance proportions
    contents:
    - extract_Sigma
    - extract_Gamma
    - predict_cross_covariance
    - extract_coevolution_modules
    - extract_Sigma_table
    - compare_Sigma_table
    - extract_Omega
    - extract_communality
    - extract_correlations
    - extract_repeatability
    - extract_phylo_signal
    - extract_proportions
    - extract_ordination
    - extract_rotated_loadings_table
    - extract_cutpoints

  - title: Methods and plots on fitted models
    desc: Standard summaries, predictions, simulations, confidence intervals, and current plotting entry point
    contents:
    - print.gllvmTMB_multi
    - print.gllvmTMB_Sigma_phy_slope
    - summary.gllvmTMB_multi
    - logLik.gllvmTMB_multi
    - confint.gllvmTMB_multi
    - tidy.gllvmTMB_multi
    - simulate.gllvmTMB_multi
    - predict.gllvmTMB_multi
    - predict_missing
    - imputed
    - phylo_signal_mi
    - plot.gllvmTMB_multi
    - plot_correlations
    - plot_Sigma_table
    - plot_Sigma_heatmap
    - plot_Sigma_comparison

  - title: First-line diagnostics and uncertainty
    desc: Start here before interpreting covariance, ordination, or interval estimates
    contents:
    - check_gllvmTMB
    - gllvmTMB_diagnose
    - predictive_check
    - diagnostic_table
    - residuals.gllvmTMB_multi
    - bootstrap_Sigma
    - confint_inspect
    - profile_repeatability
    - profile_phylo_signal
    - profile_communality
    - profile_correlation
    - profile_proportions
    - plot.profile_derived

  - title: Advanced validation utilities
    desc: Slower or developer-facing checks; use when a model or interval claim needs stronger evidence
    contents:
    - sanity_multi
    - check_auto_residual
    - check_identifiability
    - gllvmTMB_check_consistency
    - compare_dep_vs_two_psi
    - compare_indep_vs_two_psi
    - profile_targets
    - tmbprofile_wrapper
    - coverage_study

  - title: Loadings (Lambda) and confirmatory factor analysis
    desc: Extract, rotate, and constrain the loading matrix
    contents:
    - rotate_loadings
    - plot_rotated_loadings
    - compare_loadings
    - suggest_lambda_constraint
    - suggest_lambda_constraints
    - confirmatory_lambda
    - loading_ci
    - loading_profile
    - flag_unreliable_loadings
    - plot_loadings_confidence_eye
    - plot.profile_loadings

## news.releases intentionally omitted: the v0.2.0 git tag (416f8e4) and the
## GitHub release "gllvmTMB 0.2.0 — first public release" now exist, but the
## `releases:` block stays parked pending the CRAN-submission decision (the
## release identity is still being settled; DESCRIPTION reads 0.2.0 while NEWS
## still heads "(development version)"). Re-adding `releases:` is a maintainer call.
##
## In the meantime, the navbar "News" dropdown will show only the
## "Changelog" entry (NEWS.md) — which is the correct pre-release UX.
