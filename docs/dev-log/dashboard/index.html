<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GLLVM mission control</title>
<style>
:root {
  color-scheme: light dark;
  --bg: #f7f8f6;
  --panel: #ffffff;
  --soft: #edf2ef;
  --line: #d6dfda;
  --text: #18211d;
  --muted: #66736d;
  --faint: #8a9690;
  --green: #25784a;
  --green-bg: #e5f3eb;
  --gold: #986f22;
  --gold-bg: #fbf0d8;
  --blue: #2868a8;
  --blue-bg: #e6f0fb;
  --rose: #a94555;
  --rose-bg: #f8e6ea;
  --gray-bg: #e8ece9;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #171b18;
    --panel: #222822;
    --soft: #2d342f;
    --line: #414b44;
    --text: #eef2ee;
    --muted: #afbab4;
    --faint: #87928b;
    --green: #8bd19a;
    --green-bg: #1f3425;
    --gold: #e3b763;
    --gold-bg: #3b3018;
    --blue: #9dc8f2;
    --blue-bg: #1d2d44;
    --rose: #e598a6;
    --rose-bg: #442631;
    --gray-bg: #303631;
  }
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  line-height: 1.45;
}
.wrap { max-width: 1240px; margin: 0 auto; padding: 28px 22px 56px; }
.top {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 18px;
  align-items: start;
}
h1 { margin: 0; font-size: clamp(25px, 3vw, 38px); letter-spacing: 0; }
h2 { font-size: 18px; margin: 26px 0 12px; letter-spacing: 0; }
h3 { margin: 0 0 10px; font-size: 15px; letter-spacing: 0; }
.sub { max-width: 900px; margin: 8px 0 0; color: var(--muted); font-size: 15px; }
.live {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-size: 13px;
  white-space: nowrap;
  margin-top: 6px;
}
.dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); }
.claim {
  margin: 22px 0 14px;
  padding: 14px 16px;
  border: 1px solid var(--gold);
  background: var(--gold-bg);
  color: var(--text);
  border-radius: 8px;
}
.claim strong { display: block; margin-bottom: 4px; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 12px;
  margin: 16px 0 14px;
}
.card, .panel, .phase, .agent, .matrix-row, .repo, .lane {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
}
.card { padding: 15px 16px; min-height: 108px; }
.label { color: var(--muted); font-size: 12px; }
.value { margin-top: 5px; font-size: 24px; font-weight: 720; line-height: 1.08; overflow-wrap: anywhere; }
.note { margin-top: 8px; color: var(--faint); font-size: 12px; overflow-wrap: anywhere; }
.progress { height: 10px; display: flex; overflow: hidden; border-radius: 999px; background: var(--gray-bg); margin-top: 8px; }
.bar-covered { background: var(--green); }
.bar-active { background: var(--gold); }
.bar-partial { background: var(--blue); }
.bar-blocked { background: var(--rose); }
.repo-grid, .lane-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  margin-top: 8px;
}
.repo, .lane { padding: 12px 13px; min-height: 116px; }
.repo.warn, .lane.warn { border-color: var(--gold); background: var(--gold-bg); }
.repo.dirty, .lane.blocked { border-color: var(--rose); background: var(--rose-bg); }
.repo-name, .lane-name { display: flex; justify-content: space-between; gap: 8px; align-items: center; font-weight: 700; }
.repo-meta, .lane-meta { margin-top: 5px; color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }
.two-col { display: grid; grid-template-columns: 1.02fr .98fr; gap: 16px; margin-top: 18px; }
.phase { margin-bottom: 10px; overflow: hidden; }
.phase-head {
  display: grid;
  grid-template-columns: 88px 1fr auto auto;
  gap: 12px;
  align-items: center;
  padding: 13px 14px;
}
.phase-id { color: var(--muted); font-size: 12px; }
.phase-name { font-weight: 680; }
.phase-owner { color: var(--muted); font-size: 12px; }
.pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 74px;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 750;
  text-transform: lowercase;
}
.covered, .verified, .success, .banked { background: var(--green-bg); color: var(--green); }
.active, .partial, .warn, .guard { background: var(--gold-bg); color: var(--gold); }
.queued, .deferred, .planned, .local, .unknown, .not_applicable, .not-applicable { background: var(--gray-bg); color: var(--muted); }
.blocked, .fail, .dirty { background: var(--rose-bg); color: var(--rose); }
.info, .draft, .running, .in_progress { background: var(--blue-bg); color: var(--blue); }
.slices { padding: 0 14px 12px 110px; }
.slice {
  display: grid;
  grid-template-columns: 11px 1fr auto;
  gap: 10px;
  align-items: start;
  min-height: 32px;
  padding: 7px 0;
  border-top: 1px solid var(--line);
  font-size: 13px;
}
.sdot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; background: var(--faint); }
.sdot.covered, .sdot.verified, .sdot.success, .sdot.banked { background: var(--green); }
.sdot.active, .sdot.partial, .sdot.warn, .sdot.guard { background: var(--gold); }
.sdot.blocked, .sdot.fail, .sdot.dirty { background: var(--rose); }
.sdot.info, .sdot.draft, .sdot.running, .sdot.in_progress { background: var(--blue); }
.panel { padding: 15px 16px; margin-bottom: 14px; }
.activity, .evidence, .blocker {
  display: grid;
  grid-template-columns: 92px 1fr;
  gap: 10px;
  padding: 8px 0;
  border-top: 1px solid var(--line);
  font-size: 13px;
}
.activity:first-child, .evidence:first-child, .blocker:first-child { border-top: 0; }
.who { font-weight: 720; color: var(--green); }
.stamp { color: var(--faint); font-size: 12px; overflow-wrap: anywhere; }
.team {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}
.agent { padding: 12px; min-height: 154px; }
.agent-top { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
.agent-name { font-weight: 760; }
.agent-role { color: var(--muted); font-size: 12px; margin-top: 4px; }
.agent-row { margin-top: 7px; color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }
.agent-row strong { color: var(--text); font-weight: 700; }
.matrix { display: grid; gap: 8px; }
.matrix-row {
  display: grid;
  grid-template-columns: minmax(82px, .42fr) minmax(160px, .9fr) minmax(74px, .38fr) minmax(100px, .5fr) minmax(100px, .5fr) minmax(120px, .62fr) minmax(190px, 1fr) minmax(200px, 1.05fr);
  gap: 8px;
  align-items: center;
  padding: 10px;
  font-size: 12px;
}
.matrix-head {
  background: transparent;
  border: 0;
  color: var(--muted);
  font-weight: 760;
  padding-top: 0;
}
.cell { min-width: 0; overflow-wrap: anywhere; }
a { color: var(--blue); text-decoration-thickness: 1px; text-underline-offset: 2px; }
code { background: var(--soft); border-radius: 5px; padding: 1px 5px; font-size: .92em; }
@media (max-width: 1020px) {
  .top, .two-col { grid-template-columns: 1fr; }
  .repo-grid, .lane-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .team { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .phase-head { grid-template-columns: 74px 1fr; }
  .phase-owner, .phase-head .pill { justify-self: start; }
  .slices { padding-left: 14px; }
  .matrix-row { grid-template-columns: 1fr; }
  .matrix-head { display: none; }
}
@media (max-width: 620px) {
  .repo-grid, .lane-grid, .team { grid-template-columns: 1fr; }
  .activity, .evidence, .blocker { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<main class="wrap">
  <section class="top">
    <div>
      <h1 id="title">GLLVM mission control</h1>
      <p class="sub" id="subtitle">Loading the finish-plan board...</p>
    </div>
    <div class="live"><span class="dot"></span><span id="updated">connecting</span></div>
  </section>

  <section class="claim" id="claim-strip"></section>
  <section class="grid" id="truth-cards"></section>
  <section id="progress"></section>

  <h2>Repo Truth</h2>
  <section class="repo-grid" id="repos"></section>

  <section class="two-col">
    <div>
      <h2>Roadmap</h2>
      <div id="phases"></div>
    </div>
    <div>
      <h2>Now</h2>
      <div class="panel">
        <h3>Active work</h3>
        <div id="active-work"></div>
      </div>
      <div class="panel">
        <h3>Serial gates</h3>
        <div id="serial-gates"></div>
      </div>
      <div class="panel">
        <h3>Blockers and claim guards</h3>
        <div id="blockers"></div>
      </div>
    </div>
  </section>

  <h2>Safe Parallel Lanes</h2>
  <section class="lane-grid" id="parallel-lanes"></section>

  <h2>Team</h2>
  <section class="team" id="team"></section>

  <h2>Master capability matrix</h2>
  <section class="matrix" id="matrix"></section>

  <h2>Evidence bank</h2>
  <section class="panel" id="evidence"></section>
</main>

<script>
const BUILD = "r1";
const statusClass = (x) => String(x || "unknown").toLowerCase().replace(/[^a-z0-9_-]/g, "-");
const text = (x) => String(x == null ? "" : x);
const esc = (x) => text(x).replace(/[&<>"']/g, (m) => ({
  "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
})[m]);
const pill = (x) => `<span class="pill ${statusClass(x)}">${esc(x)}</span>`;
const link = (x, label) => x ? `<a href="${esc(x)}">${esc(label || x)}</a>` : "";

async function readJson(path) {
  const response = await fetch(path + "?_=" + Date.now());
  if (!response.ok) throw new Error(path);
  return response.json();
}

function combineArray(base, overlay, key) {
  return [...(base[key] || []), ...((overlay || {})[key] || [])];
}

function mergeStatus(base, overlay) {
  const merged = Object.assign({}, base, overlay || {}, {
    metrics: Object.assign({}, base.metrics || {}, (overlay || {}).metrics || {})
  });
  ["active_work", "evidence", "blockers"].forEach((key) => {
    merged[key] = combineArray(base, overlay, key);
  });
  return merged;
}

function itemList(items, empty) {
  return (items && items.length)
    ? items.map((x) => `<div class="activity"><div class="stamp">${esc(x.when || x.status || "")}</div><div><span class="who">${esc(x.who || x.kind || "")}</span> ${esc(x.text || x.item || "")} ${link(x.url, x.link_label)}</div></div>`).join("")
    : `<div class="activity"><div class="stamp">idle</div><div>${esc(empty)}</div></div>`;
}

function renderTruth(data) {
  const cards = data.truth_cards || [];
  document.getElementById("truth-cards").innerHTML = cards.map((card) =>
    `<article class="card">
      <div class="label">${esc(card.label)}</div>
      <div class="value">${esc(card.value)}</div>
      <div class="note">${pill(card.status || "info")} ${esc(card.note || "")}</div>
    </article>`
  ).join("");
  const metrics = data.metrics || {};
  const total = Math.max(1, Number(metrics.total || 1));
  const covered = 100 * Number(metrics.covered || 0) / total;
  const active = 100 * Number(metrics.active || 0) / total;
  const partial = 100 * Number(metrics.partial || 0) / total;
  const blocked = 100 * Number(metrics.blocked || 0) / total;
  document.getElementById("progress").innerHTML =
    `<div class="label">Capability board: ${esc(metrics.covered || 0)} covered, ${esc(metrics.partial || 0)} partial, ${esc(metrics.active || 0)} active, ${esc(metrics.blocked || 0)} blocked of ${esc(total)} rows</div>
     <div class="progress"><div class="bar-covered" style="width:${covered}%"></div><div class="bar-partial" style="width:${partial}%"></div><div class="bar-active" style="width:${active}%"></div><div class="bar-blocked" style="width:${blocked}%"></div></div>
     <div class="note">Green requires linked evidence. Gold means active or partial. Rose means blocked by missing engine, inference, validation, or claim evidence.</div>`;
}

function renderRepos(data) {
  document.getElementById("repos").innerHTML = (data.repos || []).map((repo) =>
    `<article class="repo ${statusClass(repo.state)}">
      <div class="repo-name"><span>${esc(repo.name)}</span>${pill(repo.state || "unknown")}</div>
      <div class="repo-meta">branch: <code>${esc(repo.branch || "unknown")}</code></div>
      <div class="repo-meta">head: <code>${esc(repo.head || "unknown")}</code></div>
      <div class="repo-meta">${esc(repo.note || "")} ${link(repo.url, repo.link_label)}</div>
    </article>`
  ).join("");
}

function renderPhases(data) {
  document.getElementById("phases").innerHTML = (data.phases || []).map((phase) => {
    const slices = (phase.slices || []).map((s) =>
      `<div class="slice"><span class="sdot ${statusClass(s.status)}"></span><div>${esc(s.name)} ${link(s.url, s.issue)}</div>${pill(s.status)}</div>`
    ).join("");
    return `<article class="phase">
      <div class="phase-head">
        <div class="phase-id">${esc(phase.id)}</div>
        <div><div class="phase-name">${esc(phase.name)}</div><div class="phase-owner">${esc(phase.owner || "")}</div></div>
        <div class="phase-owner">${esc(phase.counts || "")}</div>
        ${pill(phase.status)}
      </div>
      <div class="slices">${slices}</div>
    </article>`;
  }).join("");
}

function renderLanes(data) {
  document.getElementById("parallel-lanes").innerHTML = (data.parallel_lanes || []).map((lane) =>
    `<article class="lane ${statusClass(lane.status)}">
      <div class="lane-name"><span>${esc(lane.lane)}</span>${pill(lane.status)}</div>
      <div class="lane-meta"><strong>owners:</strong> ${esc(lane.owners)}</div>
      <div class="lane-meta"><strong>parallel with:</strong> ${esc(lane.parallel_with)}</div>
      <div class="lane-meta"><strong>join gate:</strong> ${esc(lane.join_gate)}</div>
    </article>`
  ).join("");
}

function renderTeam(data) {
  document.getElementById("team").innerHTML = (data.agents || []).map((agent) =>
    `<article class="agent">
      <div class="agent-top"><span class="agent-name">${esc(agent.name)}</span>${pill(agent.status)}</div>
      <div class="agent-role">${esc(agent.role)}</div>
      <div class="agent-row"><strong>task:</strong> ${esc(agent.task)}</div>
      <div class="agent-row"><strong>blocked by:</strong> ${esc(agent.blocked_by || "none")}</div>
      <div class="agent-row"><strong>parallel:</strong> ${esc(agent.parallel_with || "none")}</div>
      <div class="agent-row"><strong>join:</strong> ${esc(agent.join_gate || "none")}</div>
    </article>`
  ).join("");
}

function renderMatrix(data) {
  const head = ["Row", "Capability", "Status", "Engine", "Bridge", "Inference", "Evidence", "Next gate"];
  const rows = (data.matrix || []).map((row) =>
    `<article class="matrix-row">
      <div class="cell"><strong>${esc(row.id)}</strong></div>
      <div class="cell">${esc(row.capability)}</div>
      <div class="cell">${pill(row.status)}</div>
      <div class="cell">${pill(row.engine)}</div>
      <div class="cell">${pill(row.bridge)}</div>
      <div class="cell">${pill(row.inference)}</div>
      <div class="cell">${esc(row.evidence || "")} ${link(row.url, row.link_label)}</div>
      <div class="cell">${esc(row.next_gate)}</div>
    </article>`
  ).join("");
  document.getElementById("matrix").innerHTML =
    `<article class="matrix-row matrix-head">${head.map((x) => `<div>${esc(x)}</div>`).join("")}</article>${rows}`;
}

function render(data) {
  document.getElementById("title").textContent = data.title || "GLLVM mission control";
  document.getElementById("subtitle").textContent = data.subtitle || "";
  document.getElementById("updated").textContent = "live - " + (data.updated || "unknown");
  document.getElementById("claim-strip").innerHTML = `<strong>${esc(data.claim_guard && data.claim_guard.title || "Claim boundary")}</strong>${esc(data.claim_guard && data.claim_guard.text || "")}`;
  renderTruth(data);
  renderRepos(data);
  renderPhases(data);
  renderLanes(data);
  renderTeam(data);
  renderMatrix(data);
  document.getElementById("active-work").innerHTML = itemList(data.active_work, "No active slice recorded.");
  document.getElementById("serial-gates").innerHTML = itemList(data.serial_gates, "No serial gate recorded.");
  document.getElementById("blockers").innerHTML = itemList(data.blockers, "No blockers recorded.");
  document.getElementById("evidence").innerHTML = itemList(data.evidence, "No evidence rows recorded.");
}

async function tick() {
  try {
    const version = await fetch("version.txt?_=" + Date.now()).then((x) => x.text()).then((x) => x.trim());
    if (version && version !== BUILD) location.reload();
  } catch (err) {}
  try {
    const base = await readJson("status.json");
    let overlay = {};
    try { overlay = await readJson("sweep.json"); } catch (err) {}
    render(mergeStatus(base, overlay));
  } catch (err) {
    document.getElementById("subtitle").textContent = "Dashboard data did not load. Check status.json and sweep.json.";
  }
}

tick();
setInterval(tick, 8000);
</script>
</body>
</html>
